<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sidframe</title>
    <link rel="shortcut icon" href="images/faavicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="news.css" />
    <link rel="shortcut icon" href="images/faavicon.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>
    <a href="index.html" class="back">← Back to Blog</a>
    <!-- NAVBAR -->
    <header class="navbar">
        <div class="nav-container">
            <a id="nav-btn-l" href="index.html" class="logo">sidframe.</a>
            <nav class="nav-links">
                <a id="nav-btn-n" href="index.html">Blog</a>
                <a id="nav-btn-n" href="projects.html">Projects</a>
                <a id="nav-btn-n" href="news.html" class="active">News</a>
            </nav>
        </div>
    </header>

    <!-- PAGE HEADING -->
    <section class="page-header">
        <h1>News & Updates</h1>
        <p>All official updates, announcements, and platform changes.</p>
    </section>

    <!-- SEARCH BAR -->
    <section class="search-section">
        <input type="text" id="searchInput" placeholder="Search news by title or tag..." />
    </section>
    <!-- NEWS CONTAINER -->
    <section class="blog-section">
        <div class="blog-container"></div>
    </section>

    <script>
        const container = document.querySelector(".blog-container");
        let allNews = [];

        // Primary: load local posts.json so static hosts (Vercel) always show posts
        function loadLocalPosts(){
            fetch('posts.json')
                .then(r => r.json())
                .then(posts => {
                    allNews = posts;
                    renderNews(posts);
                })
                .catch(e => {
                    console.warn('Could not load local posts.json', e);
                });
        }

        // Secondary: attempt to fetch remote /api/news and update view if available
        function tryUpdateFromApi(){
            fetch('/api/news')
                .then(res => {
                    if(!res.ok) throw new Error('API not available');
                    return res.json();
                })
                .then(data => {
                    const articles = data.articles || data;
                    if(Array.isArray(articles) && articles.length){
                        allNews = articles;
                        renderNews(articles);
                    }
                })
                .catch(err => {
                    console.info('News API not available or returned invalid data', err);
                });
        }

        loadLocalPosts();
        tryUpdateFromApi();
        setInterval(tryUpdateFromApi, 300000);

        function sortNewsById(items) {
            return [...items].sort((a, b) => {
                const idA = Number(a.id);
                const idB = Number(b.id);
                if (!Number.isNaN(idA) && !Number.isNaN(idB)) return idB - idA;
                return String(b.id).localeCompare(String(a.id));
            });
        }

        function renderNews(news) {
            container.innerHTML = "";

            if (!news || news.length === 0) {
                container.innerHTML = `<p class="no-posts">No news found.</p>`;
                return;
            }

            const sortedNews = sortNewsById(news);
            sortedNews.forEach(article => {
                const img = article.urlToImage || article.image || article.thumbnail || 'images/main.png';
                const title = article.title || article.heading || article.name || 'Untitled';
                const desc = article.description || article.excerpt || (Array.isArray(article.content) ? (typeof article.content[0] === 'string' ? article.content[0] : (article.content[0].text || '')) : '') || '';
                const source = (article.source && article.source.name) || article.Author || 'sidframe';
                const published = article.publishedAt || article.date || '';
                const link = article.url || `post.html?id=${article.id || ''}`;

                const card = document.createElement('div');
                card.className = 'post-card in-view';
                card.innerHTML = `
                    <a class="news-media" href="${link}" ${article.url ? 'target="_blank" rel="noopener"' : ''}>
                      <img src="${img}" class="post-thumb" alt="${title}">
                    </a>
                    <div class="post-content">
                        <span class="news-badge">NEWS</span>
                        <h2><a class="news-link" href="${link}" ${article.url ? 'target="_blank" rel="noopener"' : ''}>${title}</a></h2>
                        <p>${desc}</p>
                        <div class="post-meta">
                            <span>${source}</span>
                            <span>${published ? new Date(published).toLocaleDateString() : ''}</span>
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // Search
        const searchInput = document.getElementById("searchInput");
        if (searchInput) {
            searchInput.addEventListener("input", () => {
                const q = searchInput.value.toLowerCase();
                const filtered = allNews.filter(article => {
                    const title = (article.title || '').toLowerCase();
                    const desc = (article.description || article.excerpt || '').toLowerCase();
                    const tags = (article.tags || []).join(' ').toLowerCase();
                    return title.includes(q) || desc.includes(q) || tags.includes(q);
                });
                renderNews(filtered);
            });
        }
    </script>

</body>

</html>
